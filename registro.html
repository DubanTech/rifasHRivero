<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Crear Cuenta | RifaMax</title>

    <meta
      name="description"
      content="Regístrate en RifaMax y participa en rifas online de forma segura."
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body class="bg-light">
    <!-- NAVBAR -->

    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html"> 🎟️ RifaMax </a>
      </div>
    </nav>

    <!-- REGISTRO -->

    <section class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <div class="card shadow border-0">
            <div class="card-body p-4">
              <div class="text-center mb-4">
                <h2 class="fw-bold">Crear Cuenta</h2>

                <p class="text-muted">Regístrate para comenzar a participar</p>
              </div>

              <form id="registerForm">
                <!-- NOMBRE -->

                <div class="mb-3">
                  <label for="fullName" class="form-label">
                    Nombre Completo
                  </label>

                  <input
                    type="text"
                    id="fullName"
                    class="form-control"
                    required
                  />
                </div>

                <!-- DOCUMENTO -->

                <div class="mb-3">
                  <label for="document" class="form-label">
                    Cédula / Documento
                  </label>

                  <input
                    type="text"
                    id="document"
                    class="form-control"
                    required
                  />
                </div>

                <!-- TELÉFONO -->

                <div class="mb-3">
                  <label for="phone" class="form-label"> Celular </label>

                  <input
                    type="tel"
                    id="phone"
                    class="form-control"
                    placeholder="3001234567"
                    required
                  />
                </div>

                <!-- EMAIL -->

                <div class="mb-3">
                  <label for="email" class="form-label">
                    Correo Electrónico
                  </label>

                  <input
                    type="email"
                    id="email"
                    class="form-control"
                    autocomplete="email"
                    required
                  />
                </div>

                <!-- PASSWORD -->

                <div class="mb-3">
                  <label for="password" class="form-label"> Contraseña </label>

                  <div class="input-group">
                    <input
                      type="password"
                      id="password"
                      class="form-control"
                      minlength="8"
                      required
                    />

                    <button
                      type="button"
                      class="btn btn-outline-secondary"
                      id="togglePassword"
                    >
                      👁
                    </button>
                  </div>
                </div>

                <!-- CONFIRMAR -->

                <div class="mb-3">
                  <label for="confirmPassword" class="form-label">
                    Confirmar Contraseña
                  </label>

                  <input
                    type="password"
                    id="confirmPassword"
                    class="form-control"
                    required
                  />
                </div>

                <!-- ERROR -->

                <div id="passwordError" class="alert alert-danger d-none">
                  Las contraseñas no coinciden.
                </div>

                <!-- TÉRMINOS -->

                <div class="form-check mb-4">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="terms"
                    required
                  />

                  <label class="form-check-label" for="terms">
                    Acepto los términos y condiciones
                  </label>
                </div>

                <button type="submit" class="btn btn-success w-100">
                  Crear Cuenta
                </button>
              </form>

              <hr />

              <div class="text-center">
                <p class="mb-0">
                  ¿Ya tienes cuenta?

                  <a href="login.html" class="fw-bold text-decoration-none">
                    Inicia Sesión
                  </a>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script>
      const togglePassword = document.getElementById("togglePassword");

      const passwordInput = document.getElementById("password");

      togglePassword.addEventListener("click", () => {
        passwordInput.type =
          passwordInput.type === "password" ? "text" : "password";
      });

      document
        .getElementById("registerForm")
        .addEventListener("submit", (e) => {
          e.preventDefault();

          const password = document.getElementById("password").value;

          const confirm = document.getElementById("confirmPassword").value;

          const error = document.getElementById("passwordError");

          if (password !== confirm) {
            error.classList.remove("d-none");

            return;
          }

          error.classList.add("d-none");

          /*
           * REGISTRO REAL
           * API / FIREBASE / NODE / LARAVEL
           */

          window.location.href = "dashboard.html";
        });
    </script>
  </body>
</html>
