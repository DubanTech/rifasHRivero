<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Iniciar Sesión | RifaMax</title>

    <meta
      name="description"
      content="Ingresa a tu cuenta de RifaMax para administrar tus boletas y participar en rifas."
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body class="bg-light">
    <!-- NAVBAR -->

    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html"> 🎟️ RifaMax </a>
      </div>
    </nav>

    <!-- LOGIN -->

    <section class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
          <div class="card shadow border-0">
            <div class="card-body p-4">
              <div class="text-center mb-4">
                <h2 class="fw-bold">Iniciar Sesión</h2>

                <p class="text-muted">Accede a tu cuenta</p>
              </div>

              <form id="loginForm">
                <!-- EMAIL -->

                <div class="mb-3">
                  <label for="email" class="form-label">
                    Correo Electrónico
                  </label>

                  <input
                    type="email"
                    id="email"
                    class="form-control"
                    placeholder="correo@ejemplo.com"
                    autocomplete="email"
                    required
                  />
                </div>

                <!-- PASSWORD -->

                <div class="mb-3">
                  <label for="password" class="form-label"> Contraseña </label>

                  <div class="input-group">
                    <input
                      type="password"
                      id="password"
                      class="form-control"
                      autocomplete="current-password"
                      required
                    />

                    <button
                      type="button"
                      class="btn btn-outline-secondary"
                      id="togglePassword"
                    >
                      👁
                    </button>
                  </div>
                </div>

                <!-- RECORDAR -->

                <div
                  class="d-flex justify-content-between align-items-center mb-4"
                >
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      id="rememberMe"
                    />

                    <label class="form-check-label" for="rememberMe">
                      Recordarme
                    </label>
                  </div>

                  <a
                    href="recuperar-password.html"
                    class="text-decoration-none"
                  >
                    ¿Olvidaste tu contraseña?
                  </a>
                </div>

                <!-- BOTÓN -->

                <button type="submit" class="btn btn-primary w-100">
                  Ingresar
                </button>
              </form>

              <hr />

              <div class="text-center">
                <p class="mb-0">
                  ¿No tienes cuenta?

                  <a href="registro.html" class="text-decoration-none fw-bold">
                    Regístrate
                  </a>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script>
      const togglePassword = document.getElementById("togglePassword");

      const passwordInput = document.getElementById("password");

      togglePassword.addEventListener("click", () => {
        passwordInput.type =
          passwordInput.type === "password" ? "text" : "password";
      });

      document.getElementById("loginForm").addEventListener("submit", (e) => {
        e.preventDefault();

        /*
         * AQUÍ VA TU LOGIN REAL
         * API / Firebase / Laravel / Node
         */

        window.location.href = "dashboard.html";
      });
    </script>
  </body>
</html>
