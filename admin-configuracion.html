<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <title>Configuración General</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <script>
      if (localStorage.getItem("adminLogged") !== "true") {
        window.location.href = "admin-login.html";
      }

      function logout() {
        localStorage.removeItem("adminLogged");
        localStorage.removeItem("adminEmail");

        window.location.href = "admin-login.html";
      }
    </script>

    <div class="admin-wrapper">
      <!-- SIDEBAR -->

      <div class="sidebar">
        <div class="sidebar bg-dark text-white p-3">
          <div class="mb-4 text-center">
            <h4 class="fw-bold">⚙️ RifaMax</h4>
            <small>Panel Admin</small>
          </div>

          <ul class="nav flex-column">
            <li class="nav-item mb-2">
              <a href="admin-dashboard.html" class="nav-link text-white">
                📊 Dashboard
              </a>
            </li>

            <li class="nav-item mb-2">
              <a href="admin-rifas.html" class="nav-link text-white">
                🎟️ Rifas
              </a>
            </li>

            <li class="nav-item mb-2">
              <a
                href="admin-validacion-sorteos.html"
                class="nav-link text-white"
              >
                🏆 Validación Sorteos
              </a>
            </li>

            <li class="nav-item mb-2">
              <a href="admin-pagos.html" class="nav-link text-white">
                💳 Pagos
              </a>
            </li>

            <li class="nav-item mb-2">
              <a href="admin-administradores.html" class="nav-link text-white">
                🛡️ Administradores
              </a>
            </li>

            <li class="nav-item mb-2">
              <a href="admin-notificaciones.html" class="nav-link text-white">
                🔔 Notificaciones
              </a>
            </li>

            <li class="nav-item mb-2">
              <a
                href="admin-configuracion.html"
                class="nav-link text-white active"
              >
                ⚙️ Configuración
              </a>
            </li>

            <hr />

            <li class="nav-item">
              <button class="btn btn-outline-light w-100" onclick="logout()">
                🚪 Cerrar sesión
              </button>
            </li>
          </ul>
        </div>
      </div>

      <!-- CONTENIDO -->

      <div class="main-content">
        <div class="topbar">
          <h4>Configuración General</h4>
        </div>

        <div class="content-area">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <!-- SOPORTE -->

              <h5 class="mb-3">📧 Soporte</h5>

              <div class="mb-4">
                <label class="form-label">Correo de Soporte</label>

                <input
                  type="email"
                  class="form-control"
                  value="soporte@rifamax.com"
                />
              </div>

              <hr />

              <!-- RIFAS -->

              <h5 class="mb-3">🎟️ Configuración de Rifas</h5>

              <div class="mb-3">
                <label class="form-label">
                  Tiempo de Reserva de Boletas (minutos)
                </label>

                <input type="number" class="form-control" value="10" />
              </div>

              <div class="mb-3">
                <label class="form-label"> Mínimo de Boletas por Compra </label>

                <input type="number" class="form-control" value="2" />
              </div>

              <div class="mb-3">
                <label class="form-label"> Máximo de Boletas por Compra </label>

                <input type="number" class="form-control" value="100" />
              </div>

              <div class="mb-3">
                <label class="form-label">
                  Porcentaje mínimo vendido para solicitar extensión
                </label>

                <input type="number" class="form-control" value="80" />
              </div>

              <div class="mb-4">
                <label class="form-label">
                  Días máximos permitidos para extensión
                </label>

                <input type="number" class="form-control" value="30" />
              </div>

              <hr />

              <!-- PAGOS -->

              <h5 class="mb-3">💳 Configuración de Pagos</h5>

              <div class="mb-3">
                <label class="form-label">Llave Pública Wompi</label>

                <input class="form-control" />
              </div>

              <div class="mb-3">
                <label class="form-label">Llave Privada Wompi</label>

                <input type="password" class="form-control" />
              </div>

              <div class="mb-3">
                <label class="form-label">Webhook URL</label>

                <input class="form-control" />
              </div>

              <div class="mb-4">
                <label class="form-label">Modo</label>

                <select class="form-select">
                  <option>Sandbox</option>
                  <option selected>Producción</option>
                </select>
              </div>

              <hr />

              <!-- SORTEOS -->

              <h5 class="mb-3">🏆 Configuración de Sorteos</h5>

              <div class="mb-3">
                <label class="form-label"> Fuente Oficial del Resultado </label>

                <select class="form-select">
                  <option>Baloto</option>
                  <option>Chontico Noche</option>
                  <option>Medellín Noche</option>
                  <option>Cafeterito Noche</option>
                </select>
              </div>

              <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" checked />

                <label class="form-check-label">
                  Requerir validación manual del ganador
                </label>
              </div>

              <hr />

              <!-- NOTIFICACIONES -->

              <h5 class="mb-3">🔔 Notificaciones</h5>

              <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" checked />

                <label class="form-check-label">
                  Notificar pagos aprobados
                </label>
              </div>

              <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" checked />

                <label class="form-check-label"> Notificar ganador </label>
              </div>

              <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" checked />

                <label class="form-check-label">
                  Notificar extensiones de rifa
                </label>
              </div>

              <hr />

              <button class="btn btn-primary">Guardar Configuración</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
