<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Acceso Administrativo | RifaMax</title>

    <meta name="description" content="Panel de administración de RifaMax." />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body class="auth-body">
    <div class="container">
      <div class="row min-vh-100 justify-content-center align-items-center">
        <div class="col-md-6 col-lg-4">
          <div class="card shadow-lg border-0">
            <div class="card-body p-4">
              <div class="text-center mb-4">
                <h2 class="fw-bold">⚙️ Administración</h2>

                <p class="text-muted">Acceso exclusivo para administradores</p>
              </div>

              <form id="adminLoginForm">
                <div class="mb-3">
                  <label for="email" class="form-label"> Correo </label>

                  <input
                    type="email"
                    id="email"
                    class="form-control"
                    autocomplete="email"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="password" class="form-label"> Contraseña </label>

                  <div class="input-group">
                    <input
                      type="password"
                      id="password"
                      class="form-control"
                      required
                    />

                    <button
                      type="button"
                      class="btn btn-outline-secondary"
                      id="togglePassword"
                    >
                      👁
                    </button>
                  </div>
                </div>

                <div
                  class="d-flex justify-content-between align-items-center mb-4"
                >
                  <div class="form-check">
                    <input
                      type="checkbox"
                      class="form-check-input"
                      id="remember"
                    />

                    <label class="form-check-label" for="remember">
                      Recordarme
                    </label>
                  </div>

                  <a href="#" class="small text-decoration-none">
                    Recuperar acceso
                  </a>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                  Ingresar
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const passwordInput = document.getElementById("password");
      const togglePassword = document.getElementById("togglePassword");

      togglePassword.addEventListener("click", () => {
        passwordInput.type =
          passwordInput.type === "password" ? "text" : "password";
      });

      document
        .getElementById("adminLoginForm")
        .addEventListener("submit", (e) => {
          e.preventDefault();

          // Sesión ficticia para mockup

          localStorage.setItem("adminLogged", "true");

          localStorage.setItem(
            "adminEmail",
            document.getElementById("email").value || "admin@rifamax.com",
          );

          window.location.href = "admin-dashboard.html";
        });
    </script>
  </body>
</html>
