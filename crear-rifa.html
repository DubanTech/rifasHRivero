<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container py-5">
      <div class="d-flex justify-content-between mb-4">
        <a href="admin-rifas.html" class="btn btn-success"> Volver </a>
      </div>
      <div class="card shadow">
        <div class="card-body p-4">
          <h3 class="mb-4">Crear Nueva Rifa</h3>

          <div class="mb-3">
            <label> Nombre </label>

            <input class="form-control" />
          </div>

          <div class="mb-3">
            <label> Premio </label>

            <input class="form-control" />
          </div>

          <div class="mb-3">
            <label> Descripción </label>

            <textarea class="form-control" rows="4"></textarea>
          </div>

          <div class="row">
            <div class="col-md-4">
              <label> Precio Boleta </label>

              <input class="form-control" />
            </div>

            <div class="col-md-4">
              <label> Cantidad Boletas </label>

              <input class="form-control" />
            </div>

            <div class="col-md-4">
              <label> Fecha Sorteo </label>

              <input type="date" class="form-control" />
            </div>
          </div>

          <button class="btn btn-success mt-4">Guardar</button>
        </div>
      </div>
    </div>
  </body>
</html>
