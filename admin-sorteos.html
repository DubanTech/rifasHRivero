<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <title>Gestión de Sorteos</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <script>
      if (localStorage.getItem("adminLogged") !== "true") {
        window.location.href = "admin-login.html";
      }

      function logout() {
        localStorage.removeItem("adminLogged");
        localStorage.removeItem("adminEmail");

        window.location.href = "admin-login.html";
      }
    </script>

    <div class="admin-wrapper">
      <div class="sidebar">
        <div class="sidebar bg-dark text-white p-3">
          <div class="mb-4 text-center">
            <h4 class="fw-bold">⚙️ RifaMax</h4>
            <small>Panel Admin</small>
          </div>

          <ul class="nav flex-column">
            <li class="nav-item mb-2">
              <a href="admin-dashboard.html" class="nav-link text-white active">
                📊 Dashboard
              </a>
            </li>

            <li class="nav-item mb-2">
              <a href="admin-rifas.html" class="nav-link text-white">
                🎟️ Rifas
              </a>
            </li>

            <li class="nav-item mb-2">
              <a
                href="admin-validacion-sorteos.html"
                class="nav-link text-white"
              >
                🏆 Validación Sorteos
              </a>
            </li>

            <li class="nav-item mb-2">
              <a href="admin-pagos.html" class="nav-link text-white">
                💳 Pagos
              </a>
            </li>

            <li class="nav-item mb-2">
              <a href="admin-administradores.html" class="nav-link text-white">
                🛡️ Administradores
              </a>
            </li>

            <li class="nav-item mb-2">
              <a href="admin-notificaciones.html" class="nav-link text-white">
                🔔 Notificaciones
              </a>
            </li>

            <li class="nav-item mb-2">
              <a href="admin-configuracion.html" class="nav-link text-white">
                ⚙️ Configuración
              </a>
            </li>

            <hr />

            <li class="nav-item">
              <button class="btn btn-outline-light w-100" onclick="logout()">
                🚪 Cerrar sesión
              </button>
            </li>
          </ul>
        </div>
      </div>

      <div class="main-content">
        <div class="topbar">
          <h4>Gestión de Sorteos</h4>
        </div>

        <div class="content-area">
          <div class="card table-card">
            <div class="card-body">
              <table class="table table-hover">
                <thead>
                  <tr>
                    <th>Rifa</th>
                    <th>Fecha</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                  </tr>
                </thead>

                <tbody>
                  <tr>
                    <td>Mazda CX-30 2026</td>

                    <td>15 Ago 2026</td>

                    <td>
                      <span class="badge bg-warning"> Pendiente </span>
                    </td>

                    <td>
                      <button class="btn btn-success">Iniciar Sorteo</button>
                    </td>
                  </tr>

                  <tr>
                    <td>iPhone 17 Pro</td>

                    <td>10 Ago 2026</td>

                    <td>
                      <span class="badge bg-success"> Finalizado </span>
                    </td>

                    <td>
                      <button class="btn btn-primary">Ver Resultado</button>
                    </td>
                  </tr>
                </tbody>
              </table>

              <nav>
                <ul class="pagination">
                  <li class="page-item">
                    <a class="page-link">1</a>
                  </li>

                  <li class="page-item">
                    <a class="page-link">2</a>
                  </li>

                  <li class="page-item">
                    <a class="page-link">3</a>
                  </li>
                </ul>
              </nav>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
