<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container py-5">
      <div class="row">
        <div class="col-lg-4">
          <div class="card shadow-sm">
            <div class="card-body text-center">
              <img
                src="https://i.pravatar.cc/200"
                class="rounded-circle mb-3"
                width="120"
              />

              <h4>Juan Pérez</h4>

              <p class="text-muted">Cliente</p>
            </div>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="card shadow-sm">
            <div class="card-body">
              <h4 class="mb-4">Información Personal</h4>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label> Nombre </label>

                  <input class="form-control" value="Juan" />
                </div>

                <div class="col-md-6 mb-3">
                  <label> Apellido </label>

                  <input class="form-control" value="Pérez" />
                </div>
              </div>

              <div class="mb-3">
                <label> Correo </label>

                <input class="form-control" value="juan@gmail.com" />
              </div>

              <div class="mb-3">
                <label> Celular </label>

                <input class="form-control" value="3001234567" />
              </div>

              <button class="btn btn-primary">Guardar Cambios</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
